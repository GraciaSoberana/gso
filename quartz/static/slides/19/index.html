	<script type="text/javascript">
		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}

## I. Una introducción a los modos griegos
</div>

<aside class="notes"><ul>
<li><strong>Tiempos y voces del modo indicativo</strong>:    <ul>
<li>El tiempo gramatical indica el tiempo cronológico y el aspecto verbal.</li>
<li>La voz expresa la relación del sujeto con la acción.</li>
<li>El modo indica la relación del verbo con la realidad según la percepción del autor.</li>
</ul>
</li>
<li><strong>Modos en griego bíblico</strong>:<ul>
<li>Cuatro modos principales: indicativo, subjuntivo, optativo e imperativo.</li>
<li>Formas verbales no personales: infinitivo y participio (a veces consideradas modos).</li>
</ul>
</li>
<li><strong>Introducción al modo subjuntivo</strong>:<ul>
<li>Expresa acciones inciertas o deseos/anhelos.</li>
<li>Traducción depende del contexto pero conserva el sentido de deseo.</li>
<li>Provisionalmente traducido al <em>subjuntivo presente</em> en español: haga, desate, coma.</li>
</ul>
</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

### Un vistazo al modo subjuntivo
</div>

<aside class="notes"><ul>
<li><strong>Características del modo subjuntivo</strong>:<ul>
<li>Muestra acciones que no son seguras, pero tienen posibilidad de ocurrir.</li>
<li>Expresa deseos o anhelos.</li>
</ul>
</li>
<li><strong>Riqueza en subjuntivos</strong>:<ul>
<li>El español y el griego bíblico poseen una gran riqueza de formas subjuntivas.</li>
<li>La traducción depende del contexto, siempre manteniendo el sentido de deseo.</li>
</ul>
</li>
<li><strong>Traducción inicial</strong>:<ul>
<li>Se utilizará provisionalmente el <em>subjuntivo presente</em> en español: haga, desate, coma.</li>
<li>Al final de la clase, en el apartado #IV. sintaxis, se estudiará cómo traducirlo con mayor precisión.</li>
</ul>
</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

| Persona                       | R. Temp | <font color="#d35400">Voc. Tem</font> | <font color="#b7950b">Flex</font> | Forma verbal                                                     |
| ----------------------------- | ------- | ------------------------------------- | --------------------------------- | ---------------------------------------------------------------- |
| <span class="small">1S</span> | λύ      | <font color="#d35400">ω</font>        | <font color="#b7950b">–</font>    | λύ<font color="#d35400">ω</font>                                 |
| <span class="small">2S</span> | λύ      | <font color="#d35400">η</font>        | <font color="#b7950b">ς</font>    | λύ<font color="#d35400">ῃ</font><font color="#b7950b">ς</font>  |
| <span class="small">3S</span> | λύ      | <font color="#d35400">η</font>        | <font color="#b7950b">ι</font>    | λύ<font color="#d35400">ῃ</font>                                |
| <span class="small">1P</span> | λύ      | <font color="#d35400">ω</font>        | <font color="#b7950b">μεν</font>  | λύ<font color="#d35400">ω</font><font color="#b7950b">μεν</font> |
| <span class="small">2P</span> | λύ      | <font color="#d35400">η</font>        | <font color="#b7950b">τε</font>   | λύ<font color="#d35400">η</font><font color="#b7950b">τε</font>  |
| <span class="small">3P</span> | λύ      | <font color="#d35400">ω</font>        | <font color="#b7950b">νσι</font>  | λύ<font color="#d35400">ω</font><font color="#b7950b">σι</font>  |
</div>

<aside class="notes"><h4 id="ii21-observaciones">II.2.1. Observaciones</h4>
<ul>
<li>Ten cuidado con 1S, pues es idéntico al indicativo.</li>
<li>Al igual que en indicativo, 2S se le agrega una <strong>ι</strong> que posteriormente se suscribe.</li>
<li>En 3S la  <strong>ι</strong> se suscribe.</li>
<li>En 3P la <strong>ν</strong> se cae ante la <strong>σ</strong>.</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

| <span class="small">2P</span> | λύ   | <font color="#d35400">η</font>       | <font color="#b7950b">σθε</font>  | λύ<font color="#d35400">η</font><font color="#b7950b">σθε</font>   |

</div>

<aside class="notes"><h4 id="ii31-observaciones">II.3.1. Observaciones</h4>
<ul>
<li>Cuando se agrega la vocal tematica de 2S, la sigma de la flexion personal cae, y las vocales se reducen (λύ<font color="#d35400">η</font><font color="#b7950b">σαι</font> → λύ<font color="#d35400">η</font><font color="#b7950b">αι</font> → λύ<font color="#d35400">η</font><font color="#b7950b">ι</font> → λύ<font color="#d35400">ῃ</font>). Es idéntica a su forma indicativa y al PAS 3S, por lo que el contexto será determinante.</li>
</ul>

<aside class="notes"><p>El modo subjuntivo, junto con el optativo y el imperativo, forma parte de los <em>modos potenciales</em>. Es decir, mientras que el modo indicativo se usa para expresar una acción que es real, al menos en la mente del hablante, los modos potenciales expresan acciones que son más o menos reales.</p>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->**El modo subjuntivo** expresa un deseo que es probable.
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->**El modo optativo** expresa una una acción que es posible. 
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->**El modo imperativo** expresa una orden o un ruego.
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Las oraciones condicionales
</div>

<aside class="notes"><p>Como su nombre lo indica, una oración condicional es una estructura que expresa una condición y su resultado. Está formada por dos partes principales. La <strong>prótasis</strong> es la cláusula que contiene la condición. En español la introducimos por “si”. La <strong>apódosis</strong> es la cláusula que contiene el resultado.</p>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<img src="Griego/Morfología/imagenes/condicionales.png" alt="" style="width: 1920px; object-fit: fill">
</div>

<aside class="notes"><ul>
<li><strong>Ejemplo de oración condicional</strong>:<ul>
<li>Frase: &quot;Si estudias duro, dominarás el griego bíblico.&quot;</li>
<li>Identificación de partes:<ul>
<li><em>Prótasis</em>: &quot;Si estudias duro.&quot;</li>
<li><em>Apódosis</em>: &quot;Dominarás el griego bíblico.&quot;</li>
</ul>
</li>
</ul>
</li>
<li><strong>Limitaciones en español</strong>:<ul>
<li>No existe una forma gramatical específica para:<ul>
<li>Indicar si la prótasis es real, deseada, poco probable o irreal.</li>
</ul>
</li>
<li>La interpretación depende del contexto y del interlocutor.</li>
</ul>
</li>
<li><strong>Ambigüedad en español</strong>:<ul>
<li>La frase podría interpretarse como una acusación de que el oyente no está estudiando lo suficiente.</li>
</ul>
</li>
<li><strong>Claridad en griego koiné</strong>:<ul>
<li>El griego bíblico elimina esta ambigüedad.</li>
<li>Presenta cuatro clases de oraciones condicionales definidas:<ul>
<li>Cada una con características morfológicas y sintácticas específicas.</li>
</ul>
</li>
</ul>
</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

#### Oración condicional de primera clase
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<img src="Griego/Morfología/imagenes/1a clase.png" alt="" style="width: 1920px; object-fit: fill">
</div>

<aside class="notes"><p>Aquí tienes el texto convertido a bullets para tus diapositivas:</p>
<ul>
<li><strong>Primera clase de oración condicional</strong>:
- La prótasis se presume como verdadera según un argumento lógico.
- La apódosis sigue como una consecuencia natural de la prótasis.</li>
<li><strong>Interpretación por Daniel Wallace</strong>:
- Este tipo de oración parte de la premisa de que la condición ya se cumplió.
- Frecuentemente se traduce como: <em>“ya que... entonces”</em>.</li>
<li><strong>Uso adicional</strong>:
- También se emplea para mostrar la ilogicidad de un argumento.
- Ejemplo: “Supongamos por un momento que <strong>x</strong> es cierto… entonces observa la consecuencia ilógica.”</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

### Oración condicional de segunda clase
</div>

<aside class="notes"><h5 id="estructura">Estructura</h5>
<p>La condicional de segunda clase se caracteriza porque su prótasis es introducida por la conjunción <strong>εἰ</strong> más un verbo indicativo en tiempo pasado; mientras que la apódosis es introducida por la partícula <strong>ἄν</strong> y su verbo también en indicativo.</p>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

###  Oración condicional de tercera clase
</div>

<aside class="notes"><h5 id="estructura">Estructura</h5>
<p>En este tipo de oraciones condicionales, la prótasis es introducida por εἀν y el verbo se encuentra en modo subjuntivo. La Apódosis utiliza cualquier tiempo en cualquier modo.</p>

## V.3. ἵνα + subjuntivo
</div>

<aside class="notes"><p>Las cláusulas dependientes son aquellas que están subordinadas a una oración principal, tal es el caso de las oraciones condicionales que se subordinan por medio de la conjunción <strong>ἐάν</strong>. En el NT es muy común encontrar al modo subjuntivo después del caso del subjuntivo, lo más común es encontrarlo después de la conjunción <strong>ἵνα</strong>, que normalmente se traduce “para que”. En su gramática griega, Wallace menciona que hay siete usos de <strong>ἵνα</strong>  + subjuntivo, que veremos a continuación.^[Daniel Wallace y Daniel S. Steffen, Gramática Griega: Sintaxis del Nuevo Testamento, ed. Daniel S. Steffen, Segunda edición., vol. 13 of Biblioteca Teológica Vida (Miami, FL: Editorial Vida, 2015), 345.]</p>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

### Propósito o resultado
</div>

<aside class="notes"><p>Es el uso más común y revela la intención del verbo principal. La traducción más literal habitual será “para que” + subjuntivo, aunque dependiendo del contexto  es válido utilizar “para” + infinitivo.</p>
<p>οὗτος ἦλθεν εἰς μαρτυρίαν ἵνα μαρτυρήσῃ περὶ τοῦ φωτός, ἵνα πάντες πιστεύσωσιν διʼ αὐτοῦ.<br ><span class="author">Juan 1:7</span></p>
<!-- .element: style="line-height: 1.8; font-size: 1.2em" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## El modo subjuntivo con verbos de advertencia

<aside class="notes"><p><strong>μή + subjuntivo</strong> puede ser usado después de verbos de temor, advertencia, vigilancia, etc. Sirve como una advertencia o sugiere cuidado o ansiedad.  En español, la traducción necesita la conjunción <strong>que</strong>, para introducir el contenido de la advertencia con un verbo subjuntivo.</p>

## El modo subjuntivo en clausulas independientes
</div>

<aside class="notes"><p>En el NT el subjuntivo suele aparecer en cláusulas subordinadas. Sin en cambio, en algunas ocasiones se utiliza el subjuntivo en cláusulas independientes.</p>
<p>Los cuatro usos del modo subjuntivo en cláusulas independientes pueden distinguirse por la presencia o ausencia de adverbios negativos. Cuando un subjuntivo en cláusula independiente no tiene negativo puede ser usado como exhortatorio o deliberativo. En cambio, si la cláusula independiente tiene un negativo, el subjuntivo se usará como negación enfática o prohibición.</p>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

### El subjuntivo exhortativo
</div>

<aside class="notes"><p>En América Latina, los políticos utilizan esta forma cuando están en proselitismo. Es común escuchar a los candidatos decir: Hagamos de este país una gran nación; Votemos por el cambio del país, etc. </p>
<p>El modo subjuntivo exhortativo es utilizado cuando el hablante o escritor exhorta a otros para que hagan algo juntamente con él.</p>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

<!-- .element: style="line-height: 1.8; font-size: 1.2em" -->

</div>

</div>

        var target = {};
        for (var i = 0; i < arguments.length; i++) {

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){

	} else {

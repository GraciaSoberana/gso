<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo abierto -->
  <path d="M100,20 A80,80 0 1,1 180,100" stroke="#888" stroke-width="4" fill="none" />

  <!-- Mano estilizada (simplificada como palma abierta) -->

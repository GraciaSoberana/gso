</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="2" data-theme="gso" style="--theme:gso;">
<h1>Presentación</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="3" data-theme="gso" style="--theme:gso;">
<h3>Necesidades de crecimiento</h3>
<ol>
<li>Asombro ante el la gloria  de Dios</li>
<li>Una comprensión más clara de la <em>la Justificación</em> y <em>la Elección</em></li>
<li>Base bíblica de la santificación</li>
<li>El ministerio como respuesta al evangelio</li>
<li>Teología de la adoración</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="4" data-theme="gso" style="--theme:gso;">
<h3>Contenido</h3>
<ol>
<li>08 Principios del equipo de adoración</li>
<li>Las gloria de Dios y las doxologías en apocalipsis</li>
<li>Un estudio en Gálatas</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="5" data-theme="gso" style="--theme:gso;">
<h2>08 Principios del ministerio de Adoración</h2>
<h3>(Primera sesión)</h3>
<br />
<p>20 de Mayo 23</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="6" data-theme="gso" style="--theme:gso;">
<ol>
<li>Una adoración basada en la Escritura y saturada de la Escritura</li>
<li>Una visión clara del Dios todo glorioso</li>
<li>Una adoración centrada en Cristo y su obra</li>
<li>Una dependencia profunda e intencional del Espíritu Santo</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="7" data-theme="gso" style="--theme:gso;">
<ol start="5">
<li>Una expectativa de la Presencia manifiesta de Dios</li>
<li>Una actitud de asombro y compromiso</li>
<li>Una renuncia a la hipocresía y al orgullo</li>
<li>Una adoración llena de convicción y pasión</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="8" data-theme="gso" style="--theme:gso;">
<h3>1. Una adoración basada en la Escritura y saturada de la Escritura</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="9" data-theme="gso" style="--theme:gso;">
<h3>La naturaleza de la Escritura</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="10" data-theme="gso" style="--theme:gso;">
<p>Porque como descienden de los cielos la lluvia y la nieve, Y no vuelven allá sino que riegan la tierra, Haciéndola producir y germinar, Dando semilla al sembrador y pan al que come, <strong>11</strong> Así será Mi palabra que sale de Mi boca, No volverá a Mí vacía Sin haber realizado lo que deseo, Y logrado el propósito para el cual la envié.<br />
<strong>(Isaías 55:10–11)</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="11" data-theme="gso" style="--theme:gso;">
<p>Porque la palabra de Dios es viva y eficaz, y más cortante que cualquier espada de dos filos. Penetra hasta la división del alma y del espíritu, de las coyunturas y los tuétanos, y <em>es poderosa</em> para discernir los pensamientos y las intenciones del corazón.<br />
<strong>(Heb 4:12)</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="12" data-theme="gso" style="--theme:gso;">
<p>«¿No es Mi palabra como fuego», declara el Señor, «y como martillo que despedaza la roca?».<br />
<strong>Jer 23:29</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="13" data-theme="gso" style="--theme:gso;">
<p>Santifícalos en la verdad; Tu palabra es verdad.<br />
<strong>(Juan 17:17)</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="14" data-theme="gso" style="--theme:gso;">
<p>Ahora los encomiendo a Dios y a la palabra de Su gracia, que es poderosa para edificarlos y darles la herencia entre todos los santificados.<br />
<strong>Hechos 20:32</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="15" data-theme="gso" style="--theme:gso;">
<p>Porque todo lo que fue escrito en tiempos pasados, para nuestra enseñanza se escribió, a fin de que por medio de la paciencia y del consuelo de las Escrituras tengamos esperanza.<br />
<strong>Romanos 15:4</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="16" data-theme="gso" style="--theme:gso;">
<blockquote>
<p>Cuando las Escrituras son predicadas y leídas, el Espíritu se deleita en iluminar nuestras mentes para que nosotros entendamos, atesoremos y obedezcamos su Palabra…</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="17" data-theme="gso" style="--theme:gso;">
<blockquote>
<p>A medida que nos consagramos a la Palabra de Dios, tenemos comunión con Dios mismo y somos edificados en la fe, santificados del pecado, fortalecidos en la debilidad y sostenidos en el sufrimiento por su inmutable revelación a través de la Escritura.<br />
- <em>Declaración de fe de las Iglesias Gracia Soberana</em></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="18" data-theme="gso" style="--theme:gso;">
<h3>El Principio:</h3>
<p>Solo Su Palabra es viva y eficaz; por lo tanto debemos asegurarnos de que nuestro culto esté saturado de ella en todos los aspectos, desde los cantos hasta los anuncios.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="19" data-theme="gso" style="--theme:gso;">
<h3>Para pensar</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="20" data-theme="gso" style="--theme:gso;">
<ol>
<li>¿Qué opinas sobre este principio? ¿Realmente lo crees?</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="21" data-theme="gso" style="--theme:gso;">
<ol start="2">
<li>¿De qué manera estás demostrando esta convicción en tu vida cotidiana?</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="22" data-theme="gso" style="--theme:gso;">
<ol start="3">
<li>¿Qué acciones específicas puedes emprender para crecer en tu amor por la Palabra?</li>
<li>¿Crees que esto es importante? ¿Por qué?</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="23" data-theme="gso" style="--theme:gso;">
<ol start="5">
<li>¿De qué maneras prácticas esta convicción debe modelar la manera en que sirves en el Equipo de adoración?</li>
</ol>
</section>
